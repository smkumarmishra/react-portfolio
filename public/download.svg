<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

  <!-- Background (rounded shape for modern look) -->
  <rect x="5" y="5" width="90" height="90" rx="20" fill="black"></rect>

  <!-- Gradient -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff416c"></stop>
      <stop offset="100%" stop-color="#7b3fe4"></stop>
    </linearGradient>
  </defs>

  <!-- Letter S -->
  <path d="M65 30 
           C65 20, 35 20, 35 35 
           C35 50, 65 45, 65 60 
           C65 75, 35 75, 35 65" fill="none" stroke="url(#grad)" stroke-width="8" stroke-linecap="round"></path>

</svg>